<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Issues — Pick What Interests You</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #e6edf3;
        }
        .header .stats {
            font-size: 13px;
            color: #8b949e;
        }
        .back-link {
            color: #58a6ff;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { text-decoration: underline; }

        .directions {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 10px 20px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            font-size: 12px;
        }
        .dir { display: flex; align-items: center; gap: 4px; }
        .dir .arrow { font-weight: bold; font-size: 16px; }
        .dir-1 .arrow { color: #3fb950; }
        .dir-2 .arrow { color: #58a6ff; }
        .dir-3 .arrow { color: #d29922; }
        .dir-4 .arrow { color: #f85149; }

        .card-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 140px);
            padding: 20px;
        }

        .card {
            position: absolute;
            width: min(520px, 90vw);
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            cursor: grab;
            transition: box-shadow 0.2s;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }
        .card:active { cursor: grabbing; }
        .card.dragging { transition: none; overflow: hidden; }
        .card.animating {
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
        }

        .card .repo {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card .repo a {
            color: #58a6ff;
            text-decoration: none;
        }
        .card .repo a:hover { text-decoration: underline; }
        .card .issue-number {
            color: #8b949e;
            font-size: 13px;
        }
        .card .title {
            font-size: 20px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        .card .title a {
            color: inherit;
            text-decoration: none;
        }
        .card .title a:hover { color: #58a6ff; }

        .card .author-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .card .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid #30363d;
        }
        .card .author-name {
            font-size: 13px;
            color: #8b949e;
        }
        .card .author-name a {
            color: #58a6ff;
            text-decoration: none;
        }
        .card .author-name a:hover { text-decoration: underline; }

        .card .labels {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .card .label {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .card .body-preview {
            font-size: 13px;
            color: #8b949e;
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #21262d;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .card .body-preview.expanded {
            max-height: none;
        }
        .card .body-toggle {
            font-size: 11px;
            color: #58a6ff;
            cursor: pointer;
            margin-bottom: 10px;
            display: inline-block;
        }
        .card .body-toggle:hover { text-decoration: underline; }

        .card .meta {
            font-size: 12px;
            color: #8b949e;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .card .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card .open-gh {
            display: inline-block;
            margin-top: 12px;
            font-size: 12px;
            color: #58a6ff;
            text-decoration: none;
        }
        .card .open-gh:hover { text-decoration: underline; }

        .swipe-indicator {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            border: 2px solid;
            z-index: 5;
        }

        .empty-state {
            text-align: center;
            color: #8b949e;
            font-size: 16px;
        }
        .empty-state h2 { color: #e6edf3; margin-bottom: 12px; }

        /* Floating side button for copying picks */
        .fab-copy {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #238636;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            transition: background 0.2s, transform 0.15s;
        }
        .fab-copy:hover { background: #2ea043; transform: scale(1.08); }
        .fab-copy:active { transform: scale(0.95); }
        .fab-copy .fab-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #58a6ff;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .fab-copy .fab-tooltip {
            position: absolute;
            right: 56px;
            white-space: nowrap;
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .fab-copy:hover .fab-tooltip { opacity: 1; }

        .fab-instruction {
            position: fixed;
            bottom: 126px;
            right: 20px;
            max-width: 180px;
            font-size: 11px;
            color: #8b949e;
            text-align: right;
            line-height: 1.4;
            z-index: 50;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .fab-instruction { bottom: 116px; right: 14px; max-width: 150px; font-size: 10px; }
        }

        .results-overlay {
            position: fixed;
            inset: 0;
            background: #0d1117ee;
            z-index: 100;
            display: none;
            overflow-y: auto;
        }
        .results-overlay.visible { display: block; }
        .results-content {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }
        .results-content h2 {
            color: #e6edf3;
            margin-bottom: 20px;
            font-size: 22px;
        }
        .results-group {
            margin-bottom: 24px;
        }
        .results-group h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #30363d;
        }
        .results-group.p1 h3 { color: #3fb950; }
        .results-group.p2 h3 { color: #58a6ff; }
        .results-group.p3 h3 { color: #d29922; }
        .results-group.p4 h3 { color: #f85149; }
        .results-item {
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #21262d;
        }
        .results-item a {
            color: #58a6ff;
            text-decoration: none;
        }
        .results-item a:hover { text-decoration: underline; }
        .results-item .ri-repo { color: #8b949e; font-size: 11px; }

        .results-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .results-actions button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #c9d1d9;
            font-size: 13px;
            cursor: pointer;
        }
        .results-actions button:hover { background: #30363d; }
        .results-actions button.primary {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }
        .results-actions button.primary:hover { background: #2ea043; }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80vh;
            font-size: 16px;
            color: #8b949e;
        }

        .counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: #8b949e;
            background: #161b22;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }

        .keyboard-hint {
            font-size: 11px;
            color: #484f58;
            text-align: center;
            padding: 6px;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .header { padding: 10px 14px; }
            .header h1 { font-size: 14px; }
            .directions { gap: 10px; padding: 8px 14px; font-size: 11px; }
            .card { padding: 18px; }
            .card .title { font-size: 17px; }
            .card .body-preview { max-height: 120px; font-size: 12px; }
            .keyboard-hint { display: none; }
            .fab-copy { bottom: 60px; right: 14px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <a class="back-link" href="tracker3d.html">← Back to tracker</a>
        </div>
        <h1 id="page-title">Open Unassigned Issues</h1>
        <div class="stats" id="stats"></div>
    </div>
    <div class="directions">
        <div class="dir dir-1"><span class="arrow">←</span> Love it!</div>
        <div class="dir dir-2"><span class="arrow">↑</span> Interested</div>
        <div class="dir dir-3"><span class="arrow">↓</span> Maybe</div>
        <div class="dir dir-4"><span class="arrow">→</span> Pass</div>
    </div>
    <div class="card-container" id="card-container">
        <div class="loading" id="loading">Loading issues...</div>
    </div>
    <div class="counter" id="counter"></div>
    <div class="keyboard-hint">Drag/swipe or arrow keys · U to undo · C to copy picks</div>

    <!-- Floating copy-picks button -->
    <div class="fab-instruction" id="fab-instruction">When you've gone through enough issues, tap here to copy your picks and send to the Bread co-op team</div>
    <button class="fab-copy" id="fab-copy" title="Copy all picks as markdown">
        <span style="font-size:18px;">&#128203;</span>
        <span class="fab-badge" id="fab-badge">0</span>
        <span class="fab-tooltip">Copy picks (C)</span>
    </button>

    <div class="results-overlay" id="results">
        <div class="results-content" id="results-content"></div>
    </div>

    <script>
    (function() {
        let issues = [];
        let currentIndex = 0;
        let triaged = { 1: [], 2: [], 3: [], 4: [] };
        let history = [];
        let cardEl = null;
        let startX = 0, startY = 0, currentX = 0, currentY = 0;
        let isDragging = false;

        const orgParam = new URLSearchParams(location.search).get('org');
        const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
        const SWIPE_THRESHOLD = isMobile ? 60 : 100;

        function getTriagedCount() {
            return triaged[1].length + triaged[2].length + triaged[3].length + triaged[4].length;
        }

        function updateFabBadge() {
            const count = getTriagedCount();
            const shouldShow = count > 0 || currentIndex > 0;
            document.getElementById('fab-badge').textContent = count;
            document.getElementById('fab-copy').style.display = shouldShow ? '' : 'none';
            document.getElementById('fab-instruction').style.display = shouldShow ? '' : 'none';
        }

        async function loadData() {
            let data;
            try {
                if (orgParam) {
                    const resp = await fetch('/api/org/' + encodeURIComponent(orgParam));
                    if (resp.ok) data = await resp.json();
                }
            } catch (e) {}

            if (!data) {
                try {
                    const resp = await fetch('data/org_data.json');
                    if (resp.ok) data = await resp.json();
                } catch (e) {}
            }

            if (!data || !data.issues) {
                document.getElementById('loading').textContent = 'No issue data found.';
                return;
            }

            const orgName = data.organization || orgParam || 'org';
            document.getElementById('page-title').textContent = orgName + ' — Unassigned Issues';
            document.title = orgName + ' — Pick What Interests You';

            for (const [repoName, repoData] of Object.entries(data.issues)) {
                for (const issue of (repoData.issues || [])) {
                    if (!issue.assignees || issue.assignees.length === 0) {
                        issues.push({
                            repo: repoName,
                            repoUrl: repoData.github_url,
                            number: issue.number,
                            title: issue.title,
                            author: issue.author,
                            createdAt: issue.created_at,
                            updatedAt: issue.updated_at,
                            url: issue.html_url,
                            labels: issue.labels || [],
                            commentCount: Array.isArray(issue.comments) ? issue.comments.length : (issue.comments || 0),
                            body: issue.body || ''
                        });
                    }
                }
            }

            issues.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

            document.getElementById('stats').textContent = issues.length + ' unassigned issues';
            document.getElementById('loading').remove();
            updateCounter();
            updateFabBadge();

            if (issues.length === 0) {
                document.getElementById('card-container').innerHTML =
                    '<div class="empty-state"><h2>No unassigned issues</h2><p>All issues have assignees.</p></div>';
                return;
            }

            renderCard();
        }

        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Date.now() - new Date(dateStr).getTime();
            const days = Math.floor(diff / 86400000);
            if (days > 30) return Math.floor(days / 30) + 'mo ago';
            if (days > 0) return days + 'd ago';
            const hours = Math.floor(diff / 3600000);
            if (hours > 0) return hours + 'h ago';
            return 'just now';
        }

        // Attempt to derive a readable color for label text based on background
        function labelColors(label) {
            if (typeof label === 'object' && label.color) {
                const bg = '#' + label.color;
                // Compute luminance to pick text color
                const hex = label.color.replace('#', '');
                const r = parseInt(hex.substr(0, 2), 16);
                const g = parseInt(hex.substr(2, 2), 16);
                const b = parseInt(hex.substr(4, 2), 16);
                const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                return { bg: bg, fg: lum > 0.5 ? '#000' : '#fff' };
            }
            return { bg: '#30363d', fg: '#c9d1d9' };
        }

        function renderCard() {
            if (cardEl) cardEl.remove();
            if (currentIndex >= issues.length) {
                showResults();
                return;
            }

            const issue = issues[currentIndex];
            const card = document.createElement('div');
            card.className = 'card';

            const indicator = document.createElement('div');
            indicator.className = 'swipe-indicator';
            card.appendChild(indicator);

            // Repo + issue number
            const repo = document.createElement('div');
            repo.className = 'repo';
            const repoLink = document.createElement('a');
            repoLink.href = issue.repoUrl;
            repoLink.target = '_blank';
            repoLink.textContent = issue.repo;
            repo.appendChild(repoLink);
            const numSpan = document.createElement('span');
            numSpan.className = 'issue-number';
            numSpan.textContent = ' #' + issue.number;
            repo.appendChild(numSpan);
            card.appendChild(repo);

            // Title
            const title = document.createElement('div');
            title.className = 'title';
            const titleLink = document.createElement('a');
            titleLink.href = issue.url;
            titleLink.target = '_blank';
            titleLink.textContent = issue.title;
            title.appendChild(titleLink);
            card.appendChild(title);

            // Author row with avatar
            const authorRow = document.createElement('div');
            authorRow.className = 'author-row';
            if (issue.author && issue.author !== 'unknown') {
                const avatar = document.createElement('img');
                avatar.className = 'author-avatar';
                avatar.src = 'https://github.com/' + issue.author + '.png?size=48';
                avatar.alt = issue.author;
                avatar.onerror = function() { this.style.display = 'none'; };
                authorRow.appendChild(avatar);
                const nameSpan = document.createElement('span');
                nameSpan.className = 'author-name';
                const nameLink = document.createElement('a');
                nameLink.href = 'https://github.com/' + issue.author;
                nameLink.target = '_blank';
                nameLink.textContent = issue.author;
                nameSpan.appendChild(nameLink);
                authorRow.appendChild(nameSpan);
            }
            card.appendChild(authorRow);

            // Labels
            if (issue.labels.length > 0) {
                const labels = document.createElement('div');
                labels.className = 'labels';
                for (const lbl of issue.labels) {
                    const span = document.createElement('span');
                    span.className = 'label';
                    const name = typeof lbl === 'string' ? lbl : lbl.name || lbl;
                    span.textContent = name;
                    const colors = labelColors(lbl);
                    span.style.background = colors.bg;
                    span.style.color = colors.fg;
                    labels.appendChild(span);
                }
                card.appendChild(labels);
            }

            // Body / description
            if (issue.body && issue.body.trim()) {
                const bodyPreview = document.createElement('div');
                bodyPreview.className = 'body-preview';
                bodyPreview.textContent = issue.body;
                card.appendChild(bodyPreview);

                // Show toggle only if body is long
                if (issue.body.length > 300) {
                    const toggle = document.createElement('span');
                    toggle.className = 'body-toggle';
                    toggle.textContent = 'Show more';
                    toggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        bodyPreview.classList.toggle('expanded');
                        toggle.textContent = bodyPreview.classList.contains('expanded') ? 'Show less' : 'Show more';
                    });
                    card.appendChild(toggle);
                }
            }

            // Meta row
            const meta = document.createElement('div');
            meta.className = 'meta';

            const created = document.createElement('span');
            created.className = 'meta-item';
            created.textContent = 'Created ' + timeAgo(issue.createdAt);
            meta.appendChild(created);

            const updated = document.createElement('span');
            updated.className = 'meta-item';
            updated.textContent = 'Updated ' + timeAgo(issue.updatedAt);
            meta.appendChild(updated);

            if (issue.commentCount > 0) {
                const comments = document.createElement('span');
                comments.className = 'meta-item';
                comments.textContent = issue.commentCount + ' comment' + (issue.commentCount !== 1 ? 's' : '');
                meta.appendChild(comments);
            }
            card.appendChild(meta);

            // Open in GitHub link
            const openLink = document.createElement('a');
            openLink.className = 'open-gh';
            openLink.href = issue.url;
            openLink.target = '_blank';
            openLink.textContent = 'Open in GitHub →';
            card.appendChild(openLink);

            // Drag handler
            card.addEventListener('pointerdown', onPointerDown);

            document.getElementById('card-container').appendChild(card);
            cardEl = card;
        }

        function buildPicksMarkdown() {
            const labels = { 1: 'Love it!', 2: 'Interested', 3: 'Maybe', 4: 'Pass' };
            let md = '# My Issue Picks\n\n';
            let hasAny = false;
            for (let p = 1; p <= 4; p++) {
                if (triaged[p].length === 0) continue;
                hasAny = true;
                md += '## ' + labels[p] + '\n\n';
                for (const issue of triaged[p]) {
                    md += '- [' + issue.repo + '#' + issue.number + ': ' + issue.title + '](' + issue.url + ')\n';
                }
                md += '\n';
            }
            if (!hasAny) return '';
            return md;
        }

        function copyPicks() {
            const md = buildPicksMarkdown();
            if (!md) {
                showToast('No picks yet — swipe some issues first');
                return;
            }
            navigator.clipboard.writeText(md).then(function() {
                showToast('Copied ' + getTriagedCount() + ' picks as markdown!');
            }).catch(function() {
                showToast('Copy failed — your browser may block clipboard access');
            });
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = 'position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;z-index:200;pointer-events:none;';
            document.body.appendChild(t);
            setTimeout(function() { t.remove(); }, 1500);
        }

        // ---- Drag / swipe handling (works for mouse + touch via pointer events) ----

        function onPointerDown(e) {
            if (e.target.tagName === 'A' || e.target.closest('.body-toggle') || e.target.closest('.body-preview')) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            currentX = 0;
            currentY = 0;
            cardEl.classList.add('dragging');
            cardEl.setPointerCapture(e.pointerId);
            cardEl.addEventListener('pointermove', onPointerMove);
            cardEl.addEventListener('pointerup', onPointerUp);
            cardEl.addEventListener('pointercancel', onPointerUp);
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            cardEl.style.transform = 'translate(' + currentX + 'px, ' + currentY + 'px) rotate(' + (currentX * 0.05) + 'deg)';
            updateIndicator(currentX, currentY);
        }

        function onPointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            cardEl.classList.remove('dragging');
            cardEl.removeEventListener('pointermove', onPointerMove);
            cardEl.removeEventListener('pointerup', onPointerUp);
            cardEl.removeEventListener('pointercancel', onPointerUp);

            const absX = Math.abs(currentX);
            const absY = Math.abs(currentY);

            if (absX > SWIPE_THRESHOLD || absY > SWIPE_THRESHOLD) {
                let priority;
                if (absX > absY) {
                    priority = currentX < 0 ? 1 : 4;
                } else {
                    priority = currentY < 0 ? 2 : 3;
                }
                swipeOut(priority, currentX, currentY);
            } else {
                cardEl.style.transform = '';
                const ind = cardEl.querySelector('.swipe-indicator');
                if (ind) ind.style.opacity = '0';
            }
        }

        function updateIndicator(dx, dy) {
            const ind = cardEl.querySelector('.swipe-indicator');
            if (!ind) return;
            const absX = Math.abs(dx);
            const absY = Math.abs(dy);
            const threshold = SWIPE_THRESHOLD * 0.6;

            if (absX < threshold && absY < threshold) {
                ind.style.opacity = '0';
                return;
            }

            let label, color;
            if (absX > absY) {
                if (dx < 0) { label = '← Love it!'; color = '#3fb950'; }
                else { label = 'Pass →'; color = '#f85149'; }
            } else {
                if (dy < 0) { label = '↑ Interested'; color = '#58a6ff'; }
                else { label = 'Maybe ↓'; color = '#d29922'; }
            }

            ind.textContent = label;
            ind.style.color = color;
            ind.style.borderColor = color;
            ind.style.opacity = Math.min(1, (Math.max(absX, absY) - threshold) / 60);
        }

        function swipeOut(priority, dx, dy) {
            const issue = issues[currentIndex];
            triaged[priority].push(issue);
            history.push({ index: currentIndex, priority: priority });

            const mult = 3;
            const tx = dx ? dx * mult : 0;
            const ty = dy ? dy * mult : 0;
            cardEl.classList.add('animating');
            cardEl.style.transform = 'translate(' + tx + 'px, ' + ty + 'px) rotate(' + (tx * 0.03) + 'deg)';
            cardEl.style.opacity = '0';

            setTimeout(function() {
                currentIndex++;
                updateCounter();
                updateFabBadge();
                renderCard();
            }, 350);
        }

        function swipeByKey(priority) {
            if (currentIndex >= issues.length || !cardEl) return;
            let dx = 0, dy = 0;
            if (priority === 1) dx = -200;
            else if (priority === 4) dx = 200;
            else if (priority === 2) dy = -200;
            else if (priority === 3) dy = 200;
            swipeOut(priority, dx, dy);
        }

        function undo() {
            if (history.length === 0) return;
            const last = history.pop();
            triaged[last.priority].pop();
            currentIndex = last.index;
            updateCounter();
            updateFabBadge();
            renderCard();
        }

        function updateCounter() {
            const el = document.getElementById('counter');
            if (currentIndex >= issues.length) {
                el.textContent = 'Done — ' + issues.length + ' issues reviewed';
            } else {
                el.textContent = (currentIndex + 1) + ' / ' + issues.length;
            }
        }

        function showResults() {
            if (cardEl) cardEl.remove();
            cardEl = null;

            const overlay = document.getElementById('results');
            const content = document.getElementById('results-content');
            content.innerHTML = '';

            const h2 = document.createElement('h2');
            h2.textContent = 'Your Picks';
            content.appendChild(h2);

            const labels = { 1: 'Love it!', 2: 'Interested', 3: 'Maybe', 4: 'Pass' };
            const classes = { 1: 'p1', 2: 'p2', 3: 'p3', 4: 'p4' };
            let hasAny = false;

            for (let p = 1; p <= 4; p++) {
                if (triaged[p].length === 0) continue;
                hasAny = true;

                const group = document.createElement('div');
                group.className = 'results-group ' + classes[p];
                const h3 = document.createElement('h3');
                h3.textContent = labels[p] + ' (' + triaged[p].length + ')';
                group.appendChild(h3);

                for (const issue of triaged[p]) {
                    const item = document.createElement('div');
                    item.className = 'results-item';
                    const link = document.createElement('a');
                    link.href = issue.url;
                    link.target = '_blank';
                    link.textContent = issue.title;
                    item.appendChild(link);
                    const repoSpan = document.createElement('span');
                    repoSpan.className = 'ri-repo';
                    repoSpan.textContent = ' — ' + issue.repo + '#' + issue.number;
                    item.appendChild(repoSpan);
                    group.appendChild(item);
                }

                content.appendChild(group);
            }

            if (!hasAny) {
                const p = document.createElement('p');
                p.textContent = 'No issues triaged.';
                content.appendChild(p);
            }

            const actions = document.createElement('div');
            actions.className = 'results-actions';

            const copyAllBtn = document.createElement('button');
            copyAllBtn.className = 'primary';
            copyAllBtn.textContent = 'Copy All as Markdown';
            copyAllBtn.addEventListener('click', function() {
                copyPicks();
            });

            const resetBtn = document.createElement('button');
            resetBtn.textContent = 'Start Over';
            resetBtn.addEventListener('click', function() {
                overlay.classList.remove('visible');
                currentIndex = 0;
                triaged = { 1: [], 2: [], 3: [], 4: [] };
                history = [];
                updateCounter();
                updateFabBadge();
                renderCard();
            });

            const closeBtn = document.createElement('button');
            closeBtn.textContent = 'Close';
            closeBtn.addEventListener('click', function() {
                overlay.classList.remove('visible');
            });

            actions.appendChild(copyAllBtn);
            actions.appendChild(resetBtn);
            actions.appendChild(closeBtn);
            content.appendChild(actions);

            overlay.classList.add('visible');
        }

        // Keyboard controls
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('results').classList.contains('visible')) {
                if (e.key === 'Escape') document.getElementById('results').classList.remove('visible');
                return;
            }
            switch (e.key) {
                case 'ArrowLeft':  swipeByKey(1); break;
                case 'ArrowUp':    swipeByKey(2); e.preventDefault(); break;
                case 'ArrowDown':  swipeByKey(3); e.preventDefault(); break;
                case 'ArrowRight': swipeByKey(4); break;
                case 'c': case 'C': copyPicks(); break;
                case 'u': case 'U': undo(); break;
            }
        });

        // Floating copy button
        document.getElementById('fab-copy').addEventListener('click', function(e) {
            e.stopPropagation();
            copyPicks();
        });

        // Prevent body scroll on mobile when swiping
        document.addEventListener('touchmove', function(e) {
            if (isDragging) e.preventDefault();
        }, { passive: false });

        loadData();
    })();
    </script>
</body>
</html>
