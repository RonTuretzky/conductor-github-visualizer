worker_processes 1;
error_log /Users/wk/conductor/conductor-cli/.conductor/florence-v1/.nginx/error.log;
pid /Users/wk/conductor/conductor-cli/.conductor/florence-v1/.nginx/nginx.pid;

events {
    worker_connections 64;
}

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /Users/wk/conductor/conductor-cli/.conductor/florence-v1/.nginx/access.log;

    # HTTPS server (port 8443) — needed for WebXR
    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate /Users/wk/conductor/conductor-cli/.conductor/florence-v1/.nginx/cert.pem;
        ssl_certificate_key /Users/wk/conductor/conductor-cli/.conductor/florence-v1/.nginx/key.pem;

        root /Users/wk/conductor/conductor-cli/.conductor/florence-v1;
        index tracker3d-visionpro.html;

        location / {
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
        }
    }

    # HTTP server (port 8080) — for quick testing without SSL warnings
    server {
        listen 8080;
        server_name localhost;

        root /Users/wk/conductor/conductor-cli/.conductor/florence-v1;
        index tracker3d-visionpro.html;

        location / {
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
        }
    }
}
